<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniSwap — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="api.js"></script>
</head>
<body class="auth-page">

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="logo">Uni<span>Swap</span></a>
      <div style="flex:1;"></div>
      <a href="index.html" class="btn btn-ghost btn-sm">Back to Home</a>
    </div>
  </div>
</nav>

<div class="auth-body">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="index.html" class="logo" style="font-size:26px;">Uni<span>Swap</span></a>
      <p style="font-size:13px;color:var(--text3);margin-top:6px;">Academic Exchange Platform</p>
    </div>

    <div class="auth-form active" id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">University Email</label>
        <input type="email" class="form-input" placeholder="example@university.edu.eg">
        <div class="field-note">A verification code will be sent to this email</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" placeholder="••••••••">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Academic Field</label>
        <div class="domain-select-grid">
          <button class="domain-select-btn" onclick="selectDomain(this)">⚕️ Medical</button>
          <button class="domain-select-btn" onclick="selectDomain(this)">⚙️ Engineering</button>
          <button class="domain-select-btn" onclick="selectDomain(this)">📖 Humanities</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Faculty</label>
          <select class="form-input" style="cursor:pointer;">
            <option value="">Select Faculty</option>
            <option>Faculty of Medicine</option>
            <option>Faculty of Engineering</option>
            <option>Faculty of Arts</option>
            <option>Faculty of Science</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Year</label>
          <select class="form-input" style="cursor:pointer;">
            <option value="">Select Year</option>
            <option>Preparatory</option>            
            <option>First</option>
            <option>Second</option>
            <option>Third</option>
            <option>Fourth</option>
            <option>Fifth</option>
           </select>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the <a href="#" style="color:var(--navy);font-weight:700;">Terms of Use</a> and Privacy Policy</label>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
      <div class="auth-footer-text">Already have an account? <a href="login.html">Login</a></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.className = 'toast' + (type === 'error' ? ' toast-error' : ' toast-success');
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

var selectedDomain = '';

function selectDomain(btn) {
  document.querySelectorAll('.domain-select-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const map = { '⚕️ Medical': 'medical', '⚙️ Engineering': 'engineering', '📖 Humanities': 'arts' };
  selectedDomain = map[btn.textContent.trim()] || '';
}

async function doRegister() {
  const inputs  = document.querySelectorAll('.form-input[type="text"], .form-input[type="email"], .form-input[type="password"]');
  const fname   = inputs[0].value.trim();
  const lname   = inputs[1].value.trim();
  const email   = inputs[2].value.trim();
  const pass    = inputs[3].value.trim();
  const pass2   = inputs[4].value.trim();
  const college = document.querySelectorAll('select')[0].value;
  const year    = document.querySelectorAll('select')[1].value;
  const terms   = document.getElementById('terms').checked;

  if (!fname || !lname)  { showToast('Enter first and last name', 'error'); return; }
  if (!email)            { showToast('Enter your university email', 'error'); return; }
  if (!pass || pass.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
  if (pass !== pass2)    { showToast('Passwords do not match', 'error'); return; }
  if (!selectedDomain)   { showToast('Please select your academic field', 'error'); return; }
  if (!terms)            { showToast('You must agree to the terms first', 'error'); return; }

  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Creating account...';
  btn.disabled = true;

  try {
    await AuthAPI.register({
      name: `${fname} ${lname}`,
      email, password: pass,
      domain: selectedDomain,
      college: college || null,
      year: year || null,
    });
    showToast('Account created! Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch (err) {
    showToast(err.message || 'Registration failed — try again', 'error');
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
